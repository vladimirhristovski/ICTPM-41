# Use H2 in-memory database for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate create the schema automatically from entities
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# JWT
jwt.secret=test-secret-key-for-testing-only-minimum-256-bits-long
jwt.expiration=86400000

# AI Service
ai.service.url=http://localhost:8000

# Open-Meteo
openmeteo.base.url=https://api.open-meteo.com/v1

# Scheduler - disable during tests
scheduler.weather.fetch.cron=-

logging.level.org.springframework.web.servlet.FrameworkServlet=OFF
logging.level.org.springframework.boot.web.servlet.support=OFF