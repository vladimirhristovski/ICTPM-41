# App
spring.application.name=ictpm41
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.expiration=86400000

# Open-Meteo
openmeteo.base.url=https://api.open-meteo.com/v1

# Scheduler - runs every 6 hours
scheduler.weather.fetch.cron=0 */10 * * * *

# Server
server.port=8080

# Environment-configured properties (override via env vars in production)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5433/ictpm41}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ictpm41_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:ictpm41_pass}
ai.service.url=${AI_SERVICE_URL:http://localhost:8000}
jwt.secret=${JWT_SECRET:ictpm41-secret-key-change-in-production-minimum-256-bits}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}